# docker compose up -d
services:
  postgres:
    image: postgres
    container_name: 'player_kits_postgresql'
    ports:
      - 5432:5432
    shm_size: 128mb
    volumes:
      - ./postgresql/data/:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: playerkits
      POSTGRES_USER: playerkits
      POSTGRES_DB: playerkits
    networks:
      - player_kits_postgresql_go_net

networks:
  player_kits_postgresql_go_net:
    driver: bridge